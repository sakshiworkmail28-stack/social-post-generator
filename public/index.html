<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Post Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>✦ Social Post Generator</h1>
  <p>Generate platform-ready social media posts powered by AI</p>
</header>

<div class="container">

  <!-- ── Content & Destination ── -->
  <div class="card">
    <h2>Content &amp; Destination</h2>
    <div class="grid grid-2">
      <div>
        <label for="idea">Idea / Topic</label>
        <textarea id="idea" placeholder="Describe what you want to post about…"></textarea>
      </div>
      <div>
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" />
        <p class="field-note">A copy of your posts will be sent here if email is configured.</p>
      </div>
    </div>
  </div>

  <!-- ── Platform & Post Type ── -->
  <div class="card">
    <h2>Platform &amp; Post Type</h2>
    <div class="grid grid-2">

      <div>
        <label>Platform</label>
        <div class="toggle-group" id="platformGroup">
          <button class="toggle-btn active-fb" data-value="facebook" onclick="selectPlatform(this)">
            <svg viewBox="0 0 24 24" fill="currentColor" width="17" height="17"><path d="M24 12.073C24 5.4 18.627 0 12 0S0 5.4 0 12.073c0 6.029 4.388 11.024 10.125 11.927v-8.434H7.078v-3.493h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.234 2.686.234v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.493h-2.796v8.434C19.612 23.097 24 18.102 24 12.073z"/></svg>
            Facebook
          </button>
          <button class="toggle-btn" data-value="instagram" onclick="selectPlatform(this)">
            <svg viewBox="0 0 24 24" fill="currentColor" width="17" height="17"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            Instagram
          </button>
        </div>
        <input type="hidden" id="platform" value="facebook" />
      </div>

      <div>
        <label>Post Type</label>
        <div class="toggle-group" id="postTypeGroup">
          <button class="toggle-btn active-accent" data-value="text" onclick="selectPostType(this)">📝 Text Post</button>
          <button class="toggle-btn" data-value="image" onclick="selectPostType(this)">🖼️ Image Post</button>
        </div>
        <input type="hidden" id="postType" value="text" />
        <p class="field-note" id="imageNote" style="display:none">Image posts may take 30–60 seconds to generate.</p>
      </div>

    </div>

    <div class="grid grid-2" style="margin-top:16px">
      <div>
        <label for="dimension">Post Dimension</label>
        <select id="dimension">
          <option value="Feed (1200×628)">Feed (1200×628)</option>
          <option value="Story (1080×1920)">Story (1080×1920)</option>
          <option value="Square (1080×1080)">Square (1080×1080)</option>
          <option value="Cover Photo (851×315)">Cover Photo (851×315)</option>
          <option value="Event Banner (1920×1005)">Event Banner (1920×1005)</option>
        </select>
      </div>
      <div>
        <label for="numPosts">Number of Posts</label>
        <select id="numPosts">
          <option value="1">1 post</option>
          <option value="2">2 posts</option>
          <option value="3" selected>3 posts</option>
          <option value="4">4 posts</option>
          <option value="5">5 posts</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ── Style & Constraints ── -->
  <div class="card">
    <h2>Style &amp; Constraints</h2>
    <div class="grid grid-3">
      <div>
        <label for="tone">Tone</label>
        <select id="tone">
          <option>Professional</option>
          <option>Casual</option>
          <option>Humorous</option>
          <option>Inspirational</option>
          <option>Educational</option>
          <option>Promotional</option>
          <option>Conversational</option>
          <option>Bold &amp; Direct</option>
        </select>
      </div>
      <div>
        <label for="textLength">Text Length</label>
        <select id="textLength">
          <option value="short">Short (1–2 sentences)</option>
          <option value="medium" selected>Medium (3–4 sentences)</option>
          <option value="long">Long (5–7 sentences)</option>
        </select>
      </div>
      <div>
        <label for="charLimit">Character Limit</label>
        <input type="number" id="charLimit" value="280" min="50" max="63206" />
      </div>
    </div>
  </div>

  <!-- ── Generate ── -->
  <button class="btn-generate" id="generateBtn" onclick="generate()">
    Generate Posts
  </button>

  <div class="error-box" id="errorBox" hidden></div>

  <!-- ── Results ── -->
  <section id="results" hidden>
    <div class="results-header">
      <h2 id="resultsTitle">Generated Posts</h2>
      <span class="results-meta" id="resultsMeta"></span>
    </div>
    <div id="postsContainer"></div>
  </section>

</div><!-- /container -->

<script src="app.js"></script>
<script>
  // Show/hide image generation time note when post type changes
  const origSelectPostType = selectPostType;
  selectPostType = function(btn) {
    origSelectPostType(btn);
    document.getElementById('imageNote').style.display =
      btn.dataset.value === 'image' ? 'block' : 'none';
  };
</script>
</body>
</html>
